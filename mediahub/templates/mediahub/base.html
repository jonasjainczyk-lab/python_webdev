{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}MediaShelf{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="{% static 'mediahub/style.css' %}">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-custom py-3 px-4">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center">
            <a href="{% url 'home' %}" class="bg-danger rounded me-2"
               style="width: 70px; height: 35px; background-color:#E50914 !important;"></a>

            <a href="{% url 'movies' %}" class="text-white fw-semibold text-decoration-none ms-4">Movies</a>
            <a href="{% url 'series' %}" class="text-white fw-semibold text-decoration-none ms-4">Series</a>
            <a href="{% url 'anime' %}" class="text-white fw-semibold text-decoration-none ms-4">Anime</a>
        </div>

        <div class="d-flex align-items-center">
            <div class="input-group" style="width: 500px">
                {% if genres %}
                <select id="navbarGenreSelect" class="form-select form-select-sm custom-genre-select"
                        onchange="changeGenreOnCurrentPage(this)">
                    {% if selected_genre %}
                    <option value=""></option>
                    {% else %}
                    <option value="" selected>Genre</option>
                    {% endif %}

                    {% for g in genres %}
                    <option value="{{ g.id }}" {% if selected_genre == g.id %}selected{% endif %}>
                        {{ g.name }}
                    </option>
                    {% endfor %}
                </select>
                {% endif %}
                <div style="width: 350px">
                    <form method="get" action="{% url 'search' %}">
                        <input class="form-control custom-search-input" name="query" placeholder="Search...">
                    </form>
                </div>
            </div>

            {% if request.user.is_authenticated %}
            <!-- Wenn der User eingeloggt ist, bringt ihn der Button zum Profil -->
            <a href="{% url 'user_profile' %}" class="text-decoration-none">
                <div class="custom-profile-btn">
                    {{ request.user.username|slice:":1"|upper }}
                </div>
            </a>
            {% else %}
            <!-- Wenn er NICHT eingeloggt ist, bringt ihn der Button zum Login -->
            <a href="{% url 'login' %}" class="text-decoration-none">
                <div class="custom-profile-btn"></div>
            </a>
            {% endif %}
        </div>

    </div>
</nav>

<script>
    function changeGenreOnCurrentPage(selectElement) {
        const genreId = selectElement.value;
        const currentPath = window.location.pathname;

        // Falls Home-Seite, leiten auf Suche um
        if (currentPath === '/' || currentPath === '/mediahub/') {
            if (genreId) {
                window.location.href = '/search/?genre=' + genreId;
            }
            return;
        }

        // Wenn Movies/Series/Anime, bleiben dort und hängen ?genre= an
        const currentUrl = new URL(window.location.href);
        if (genreId) {
            currentUrl.searchParams.set('genre', genreId);
            currentUrl.searchParams.delete('page'); // Reset auf Seite 1
        } else {
            currentUrl.searchParams.delete('genre');
            currentUrl.searchParams.delete('page');
        }

        window.location.href = currentUrl.toString();
    }
</script>

<div class="container-fluid px-4 mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
